<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Flip Clock</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Jura:wght@500;700&family=Oswald:wght@500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particle-container"></div>
    <div class="container">
        <div class="clock" id="clock">
            <div class="flip-group" id="hours">
                <div class="flip-card tens">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
                <div class="flip-card ones">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
            </div>
            
            <div class="colon">:</div>

            <div class="flip-group" id="minutes">
                <div class="flip-card tens">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
                <div class="flip-card ones">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
            </div>

            <div class="colon">:</div>

            <div class="flip-group" id="seconds">
                <div class="flip-card tens">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
                <div class="flip-card ones">
                    <div class="top">0</div>
                    <div class="bottom">0</div>
                    <div class="front">0</div>
                    <div class="back">0</div>
                </div>
            </div>
        </div>
        <div id="quoteDisplay" class="quote-display">Keep moving forward</div>
    </div>
    
    <div id="settingsPanel" class="settings-panel">
        <div class="controls">
            <button id="toggleTheme">Switch Theme</button>
            <button id="toggleFormat">24H / 12H</button>
            <button id="fullscreenBtn">Full Screen</button>
        </div>

        <div class="settings">
            <div class="setting-row">
                <label for="fontSelect">Font:</label>
                <select id="fontSelect">
                    <option value="'Oswald', sans-serif">Oswald</option>
                    <option value="'Roboto Mono', monospace">Roboto Mono</option>
                    <option value="'Anton', sans-serif">Anton</option>
                    <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
                    <option value="'Jura', sans-serif">Jura</option>
                </select>
            </div>

            <div class="setting-row">
                <label for="effectSelect">Effect:</label>
                <select id="effectSelect">
                    <option value="none">None</option>
                    <option value="snow" selected>Snow</option>
                    <option value="petal">Cherry Blossom</option>
                </select>
            </div>

            <div class="setting-row">
                <label for="sizeRange">Clock Size: <span id="clockSizeVal">2.4</span></label>
                <input type="range" id="sizeRange" min="1" max="5" step="0.1" value="2.4">
            </div>

            <div class="setting-row">
                <label for="quoteEnable">Show Quote:</label>
                <input type="checkbox" id="quoteEnable" checked>
            </div>
            
            <div class="setting-row">
                <label for="quoteText">Quote:</label>
                <input type="text" id="quoteText" value="Keep moving forward">
            </div>

            <div class="setting-row">
                <label for="quoteSize">Q-Size: <span id="quoteSizeVal">32</span></label>
                <input type="range" id="quoteSize" min="12" max="64" step="1" value="32">
            </div>

            <div class="setting-row">
                <label for="quoteColor">Q-Color:</label>
                <input type="color" id="quoteColor" value="#ffffff">
            </div>
        </div>
    </div>

    <button id="settingsBtn" class="floating-btn" aria-label="Settings">
        <svg focusable="false" viewBox="0 0 24 24" width="28" height="28">
            <path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"></path>
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
